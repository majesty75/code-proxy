version: "3.8"

networks:
  uta-net:
    driver: bridge

services:
  # ---- Kafka (KRaft mode, no Zookeeper) ----
  kafka:
    image: apache/kafka:latest
    container_name: uta-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://${MAIN_SERVER_IP}:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 24
      CLUSTER_ID: "uta-poc-cluster-001"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - uta-net
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---- ClickHouse ----
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: uta-clickhouse
    ports:
      - "${CH_HTTP_PORT}:8123"
      - "${CH_NATIVE_PORT}:9000"
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: password
    volumes:
      - ch-data:/var/lib/clickhouse
      - ./clickhouse/init:/docker-entrypoint-initdb.d
    networks:
      - uta-net
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---- Parser Service ----
  parser:
    build:
      context: ./parser
      dockerfile: Dockerfile
    container_name: uta-parser
    depends_on:
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      UTA_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      UTA_KAFKA_TOPIC: raw-logs
      UTA_CH_HOST: clickhouse
      UTA_CH_PORT: 8123
      UTA_CH_DATABASE: uta
      UTA_BATCH_SIZE: 500
    restart: unless-stopped
    networks:
      - uta-net

  # ---- Grafana ----
  grafana:
    image: grafana/grafana-oss:latest
    container_name: uta-grafana
    ports:
      - "${GF_PORT}:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - uta-net

volumes:
  kafka-data:
  ch-data:
  grafana-data:
