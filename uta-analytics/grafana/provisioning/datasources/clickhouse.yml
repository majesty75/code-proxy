apiVersion: 1

datasources:
  - name: ClickHouse
    uid: clickhouse-uta
    type: grafana-clickhouse-datasource
    access: proxy
    isDefault: true
    editable: true

    jsonData:
      # Use 'server' + 'port' (NOT top-level 'url') to avoid the
      # double http://http:// parse error in grafana-clickhouse-datasource v4+
      server: clickhouse       # Docker service name on the shared uta-net network
      port: 8123
      protocol: http           # 'http' (port 8123) or 'native' (port 9000)
      username: ${UTA_CH_USERNAME}
      defaultDatabase: uta

    secureJsonData:
      # Must match CLICKHOUSE_PASSWORD in docker-compose.yml
      password: ${UTA_CH_PASSWORD}
